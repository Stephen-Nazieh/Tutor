# Solocorn CI/CD: Localhost -> Approval (PR) -> Production (merge to main)
# - CI: build + lint on every PR (safety check).
# - Preview: deploy PR to Cloud Run with --no-traffic; comment Preview URL on PR.
# - Production: on push to main, deploy and migrate 100% traffic.

name: Solocorn CI/CD (GCP Cloud Run)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

defaults:
  run:
    working-directory: tutorme-app

env:
  REGION: asia-southeast1
  SERVICE_NAME: tutorme-app
  GAR_LOCATION: asia-southeast1
  GAR_REPO: tutorme-repo
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # CI Job (Safety Check): block merge if build or lint fails
  # ---------------------------------------------------------------------------
  ci:
    name: CI (build + lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: tutorme-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Linux native bindings (Next.js build on ubuntu-latest)
        run: npm install --no-save @parcel/watcher-linux-x64-glibc @swc/core-linux-x64-gnu @next/swc-linux-x64-gnu esbuild

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint:check

  # ---------------------------------------------------------------------------
  # Preview Job (Partner Review): deploy PR revision with --no-traffic, comment URL
  # ---------------------------------------------------------------------------
  preview:
    name: Preview (deploy PR, no traffic)
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe ${{ env.GAR_REPO }} \
            --location=${{ env.GAR_LOCATION }} \
            --project=${{ env.PROJECT_ID }} 2>/dev/null || \
          gcloud artifacts repositories create ${{ env.GAR_REPO }} \
            --repository-format=docker \
            --location=${{ env.GAR_LOCATION }} \
            --project=${{ env.PROJECT_ID }} \
            --description="Docker images for tutorme-app"

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          set -e
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE_NAME }}:pr-${{ github.event.pull_request.number }}-${{ github.sha }}"
          docker build -t "$IMAGE" -f Dockerfile.production .
          docker push "$IMAGE"
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Deploy to Cloud Run (no traffic)
        id: deploy-preview
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          flags: |
            --no-traffic
            --tag=preview-pr-${{ github.event.pull_request.number }}
            --allow-unauthenticated
            --cpu=1
            --memory=1Gi
            --min-instances=0
            --max-instances=2
          # Cloud Run env vars (comma-separated to avoid gcloud multiline parsing issues)
          env_vars: NODE_ENV=production,DATABASE_URL=${{ secrets.DATABASE_URL }},DIRECT_URL=${{ secrets.DIRECT_URL }},NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }},NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }},REDIS_URL=${{ secrets.REDIS_URL }}

      - name: Get preview revision URL
        id: preview-url
        run: |
          TAG="preview-pr-${{ github.event.pull_request.number }}"
          PREVIEW_URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region="${{ env.REGION }}" \
            --format="value(status.traffic[?tag='${TAG}'].url)")
          if [ -z "$PREVIEW_URL" ]; then
            echo "Failed to resolve tagged preview URL for tag: ${TAG}" >&2
            exit 1
          fi
          echo "url=${PREVIEW_URL}" >> $GITHUB_OUTPUT
          echo "Preview URL: ${PREVIEW_URL}"

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.preview-url.outputs.url }}';
            const body = `## Solocorn Preview\n\n**Preview URL (no production traffic):** ${url}\n\nTest this revision before merging.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('Solocorn Preview'));
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

  # ---------------------------------------------------------------------------
  # Production Job: deploy on merge to main and migrate 100% traffic
  # ---------------------------------------------------------------------------
  production:
    name: Production (deploy + 100% traffic)
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: tutorme-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Linux native bindings (Next.js build on ubuntu-latest)
        run: npm install --no-save @parcel/watcher-linux-x64-glibc @swc/core-linux-x64-gnu @next/swc-linux-x64-gnu esbuild

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint:check

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe ${{ env.GAR_REPO }} \
            --location=${{ env.GAR_LOCATION }} \
            --project=${{ env.PROJECT_ID }} 2>/dev/null || \
          gcloud artifacts repositories create ${{ env.GAR_REPO }} \
            --repository-format=docker \
            --location=${{ env.GAR_LOCATION }} \
            --project=${{ env.PROJECT_ID }} \
            --description="Docker images for tutorme-app"

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          set -e
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" -f Dockerfile.production .
          docker push "$IMAGE"
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Deploy to Cloud Run (100% traffic)
        id: deploy-prod
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          flags: |
            --allow-unauthenticated
            --cpu=1
            --memory=1Gi
            --min-instances=0
            --max-instances=10
          # Cloud Run env vars (comma-separated to avoid gcloud multiline parsing issues)
          env_vars: NODE_ENV=production,DATABASE_URL=${{ secrets.DATABASE_URL }},DIRECT_URL=${{ secrets.DIRECT_URL }},NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }},NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }},REDIS_URL=${{ secrets.REDIS_URL }}

      - name: Show production URL
        run: echo "Production URL -> ${{ steps.deploy-prod.outputs.url }}"
