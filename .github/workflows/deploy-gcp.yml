# Solocorn CI/CD: Production Only (GCP Cloud Run)
# - CI: build + lint on every push to main
# - Production: on push to main, deploy and migrate 100% traffic

name: Solocorn Production Deploy (GCP Cloud Run)

on:
  push:
    branches: [main]

defaults:
  run:
    working-directory: tutorme-app

env:
  REGION: asia-southeast1
  SERVICE_NAME: tutorme-app
  MIGRATION_JOB_NAME: tutorme-app-migrate
  ADK_SERVICE_NAME: adk-service
  GAR_LOCATION: asia-southeast1
  GAR_REPO: tutorme-repo
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # CI Job (Safety Check): block if build or lint fails
  # ---------------------------------------------------------------------------
  ci:
    name: CI (build + lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: tutorme-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build landing page (integrated)
        run: |
          cd ../landing-page
          npm ci
          npm run build
          cd ../tutorme-app
          cp -r ../landing-page/dist/* public/

      - name: Install Linux native bindings (Next.js build on ubuntu-latest)
        run: npm install --no-save --legacy-peer-deps @parcel/watcher-linux-x64-glibc @swc/core-linux-x64-gnu @next/swc-linux-x64-gnu esbuild

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint:check -- --max-warnings=999999

  # ---------------------------------------------------------------------------
  # Production Job: deploy on push to main and migrate 100% traffic
  # ---------------------------------------------------------------------------
  production:
    name: Production (deploy + 100% traffic)
    runs-on: ubuntu-latest
    needs: [ci]
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: tutorme-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure deploy SA can read logs
        run: |
          set -e
          ACCOUNT=$(gcloud config get-value account 2>/dev/null || true)
          if [ -n "${ACCOUNT}" ]; then
            gcloud projects add-iam-policy-binding "${{ env.PROJECT_ID }}" \
              --member="serviceAccount:${ACCOUNT}" \
              --role="roles/logging.viewer" \
              --quiet || true
          fi

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe ${{ env.GAR_REPO }} \
            --location=${{ env.GAR_LOCATION }} \
            --project=${{ env.PROJECT_ID }} 2>/dev/null || \
          gcloud artifacts repositories create ${{ env.GAR_REPO }} \
            --repository-format=docker \
            --location=${{ env.GAR_LOCATION }} \
            --project=${{ env.PROJECT_ID }} \
            --description="Docker images for tutorme-app"

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build landing page (integrated)
        run: |
          cd ../landing-page
          npm ci
          npm run build
          cd ../tutorme-app
          cp -r ../landing-page/dist/* public/

      - name: Build and push image
        run: |
          set -e
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" -f Dockerfile.production .
          docker push "$IMAGE"
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Build and push ADK image
        run: |
          set -e
          ADK_IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.ADK_SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$ADK_IMAGE" -f ../services/adk/Dockerfile ../services/adk
          docker push "$ADK_IMAGE"
          echo "ADK_IMAGE=${ADK_IMAGE}" >> $GITHUB_ENV

      - name: Deploy ADK service
        id: deploy-adk
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.ADK_SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.ADK_IMAGE }}
          flags: |
            --allow-unauthenticated
            --cpu=1
            --memory=1Gi
            --min-instances=0
            --max-instances=10
          port: 8080
          env_vars: NODE_ENV=production,ADK_PUBLIC_HEALTH=true,ADK_AUTH_TOKEN=${{ secrets.ADK_AUTH_TOKEN }},KIMI_API_KEY=${{ secrets.KIMI_API_KEY }},NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Ensure migration job exists
        run: |
          set -e
          SERVICE_ACCOUNT=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --format="value(spec.template.spec.serviceAccountName)" || true)
          VPC_CONNECTOR=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --format="value(spec.template.metadata.annotations['run.googleapis.com/vpc-access-connector'])" || true)
          VPC_EGRESS=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --format="value(spec.template.metadata.annotations['run.googleapis.com/vpc-access-egress'])" || true)
          CLOUDSQL_INSTANCES=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --format="value(spec.template.metadata.annotations['run.googleapis.com/cloudsql-instances'])" || true)

          EXTRA_FLAGS=""
          if [ -n "${SERVICE_ACCOUNT}" ]; then
            EXTRA_FLAGS="${EXTRA_FLAGS} --service-account=${SERVICE_ACCOUNT}"
          fi
          if [ -n "${VPC_CONNECTOR}" ]; then
            EXTRA_FLAGS="${EXTRA_FLAGS} --vpc-connector=${VPC_CONNECTOR}"
          fi
          if [ -n "${VPC_EGRESS}" ]; then
            EXTRA_FLAGS="${EXTRA_FLAGS} --vpc-egress=${VPC_EGRESS}"
          fi
          if [ -n "${CLOUDSQL_INSTANCES}" ]; then
            EXTRA_FLAGS="${EXTRA_FLAGS} --set-cloudsql-instances=${CLOUDSQL_INSTANCES}"
          fi

          gcloud run jobs describe "${{ env.MIGRATION_JOB_NAME }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" 2>/dev/null || \
          gcloud run jobs create "${{ env.MIGRATION_JOB_NAME }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --image="${{ env.IMAGE }}" \
            --command="node" \
            --args="scripts/migrate.js" \
            --tasks=1 \
            --max-retries=0 \
            --set-env-vars="NODE_ENV=production,DATABASE_URL=${{ secrets.DATABASE_URL }},DIRECT_URL=${{ secrets.DIRECT_URL }}" \
            ${EXTRA_FLAGS}
          gcloud run jobs update "${{ env.MIGRATION_JOB_NAME }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --image="${{ env.IMAGE }}" \
            --command="node" \
            --args="scripts/migrate.js" \
            --tasks=1 \
            --max-retries=0 \
            --set-env-vars="NODE_ENV=production,DATABASE_URL=${{ secrets.DATABASE_URL }},DIRECT_URL=${{ secrets.DIRECT_URL }}" \
            ${EXTRA_FLAGS}

      - name: Run migrations (Cloud Run Job)
        id: run-migrations
        run: |
          set -e
          echo "=== Execute migration job ==="
          set +e
          OUTPUT=$(gcloud run jobs execute "${{ env.MIGRATION_JOB_NAME }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --wait 2>&1)
          EXIT_CODE=$?
          set -e
          echo "${OUTPUT}"

          EXECUTION=$(echo "${OUTPUT}" | sed -n 's/.*gcloud run jobs executions describe \([^ ]*\).*/\1/p' | tail -n 1)
          if [ -z "${EXECUTION}" ]; then
            EXECUTION=$(gcloud run jobs executions list \
              --job="${{ env.MIGRATION_JOB_NAME }}" \
              --region="${{ env.REGION }}" \
              --project="${{ env.PROJECT_ID }}" \
              --limit=1 --format="value(metadata.name)" 2>/dev/null || true)
          fi
          echo "EXECUTION=${EXECUTION}" >> $GITHUB_ENV

          if [ "${EXIT_CODE}" -ne 0 ]; then
            echo ""
            echo "=== Migration Job Logs (execution: ${EXECUTION:-unknown}) ==="
            if [ -n "${EXECUTION}" ]; then
              gcloud logging read "resource.type=cloud_run_job resource.labels.job_name=\"${{ env.MIGRATION_JOB_NAME }}\" resource.labels.location=\"${{ env.REGION }}\" resource.labels.execution_name=\"${EXECUTION}\"" \
                --project="${{ env.PROJECT_ID }}" \
                --limit=200 \
                --format="table(timestamp,severity,textPayload,jsonPayload.message)" || true
              echo ""
              echo "=== Execution Details (${EXECUTION}) ==="
              gcloud run jobs executions describe "${EXECUTION}" \
                --region="${{ env.REGION }}" \
                --project="${{ env.PROJECT_ID }}" \
                --format="yaml" || true
              echo ""
              echo "=== Task Details (${EXECUTION}) ==="
              TASK=$(gcloud run jobs executions tasks list \
                --execution="${EXECUTION}" \
                --region="${{ env.REGION }}" \
                --project="${{ env.PROJECT_ID }}" \
                --limit=1 \
                --format="value(name)" 2>/dev/null || true)
              if [ -n "${TASK}" ]; then
                gcloud run jobs executions tasks describe "${TASK}" \
                  --region="${{ env.REGION }}" \
                  --project="${{ env.PROJECT_ID }}" \
                  --format="yaml" || true
              else
                echo "Unable to resolve task name for execution."
              fi
            else
              echo "Unable to resolve execution name from gcloud output."
            fi
            exit "${EXIT_CODE}"
          fi

      - name: Deploy to Cloud Run (100% traffic)
        id: deploy-prod
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          flags: |
            --allow-unauthenticated
            --cpu=1
            --memory=1Gi
            --min-instances=0
            --max-instances=10
          # Cloud Run env vars (comma-separated to avoid gcloud multiline parsing issues)
          env_vars: NODE_ENV=production,APP_VERSION=${{ github.sha }},DATABASE_URL=${{ secrets.DATABASE_URL }},DIRECT_URL=${{ secrets.DIRECT_URL }},NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }},NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }},NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }},REDIS_URL=${{ secrets.REDIS_URL }},SKIP_MIGRATIONS=true,MIGRATIONS_REQUIRED=false,ADK_BASE_URL=${{ steps.deploy-adk.outputs.url }},ADK_AUTH_TOKEN=${{ secrets.ADK_AUTH_TOKEN }}

      - name: Route 100% traffic to latest
        run: |
          gcloud run services update-traffic "${{ env.SERVICE_NAME }}" \
            --region="${{ env.REGION }}" \
            --to-latest

      - name: Show production URL
        run: echo "Production URL -> ${{ steps.deploy-prod.outputs.url }}"
