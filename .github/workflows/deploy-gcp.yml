# Solocorn CI/CD: Production Only (GCP Cloud Run)
# - CI: build + lint on every push to main
# - Production: on push to main, deploy and migrate 100% traffic

name: Solocorn Production Deploy (GCP Cloud Run)

on:
  push:
    branches: [main]

defaults:
  run:
    working-directory: tutorme-app

env:
  REGION: asia-southeast1
  SERVICE_NAME: tutorme-app
  MIGRATION_JOB_NAME: tutorme-app-migrate
  ADK_SERVICE_NAME: adk-service
  GAR_LOCATION: asia-southeast1
  GAR_REPO: tutorme-repo
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # CI Job (Safety Check): block if build or lint fails
  # ---------------------------------------------------------------------------
  ci:
    name: CI (build + lint)
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: tutorme-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build landing page (integrated)
        run: |
          cd ../landing-page
          npm ci
          npm run build
          cd ../tutorme-app
          cp -r ../landing-page/dist/* public/

      - name: Install Linux native bindings (Next.js build on ubuntu-latest)
        run: npm install --no-save --legacy-peer-deps @parcel/watcher-linux-x64-glibc @swc/core-linux-x64-gnu @next/swc-linux-x64-gnu esbuild

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint:check -- --max-warnings=999999

  # ---------------------------------------------------------------------------
  # Production Job: deploy on push to main and migrate 100% traffic
  # ---------------------------------------------------------------------------
  production:
    name: Production (deploy + 100% traffic)
    runs-on: ubuntu-latest
    needs: [ci]
    # Serialize production deploys so concurrent merges don't race the single
    # Cloud Run service (which aborts with "version X specified but current is
    # Y"). New deploys queue behind the running one instead of cancelling it —
    # we never interrupt an in-flight deploy/migration.
    concurrency:
      group: prod-cloudrun-deploy
      cancel-in-progress: false
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: tutorme-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure deploy SA can read logs
        run: |
          set -e
          ACCOUNT=$(gcloud config get-value account 2>/dev/null || true)
          if [ -n "${ACCOUNT}" ]; then
            gcloud projects add-iam-policy-binding "${{ env.PROJECT_ID }}" \
              --member="serviceAccount:${ACCOUNT}" \
              --role="roles/logging.viewer" \
              --quiet || true
          fi

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe ${{ env.GAR_REPO }} \
            --location=${{ env.GAR_LOCATION }} \
            --project=${{ env.PROJECT_ID }} 2>/dev/null || \
          gcloud artifacts repositories create ${{ env.GAR_REPO }} \
            --repository-format=docker \
            --location=${{ env.GAR_LOCATION }} \
            --project=${{ env.PROJECT_ID }} \
            --description="Docker images for tutorme-app"

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build landing page (integrated)
        run: |
          cd ../landing-page
          npm ci
          npm run build
          cd ../tutorme-app
          cp -r ../landing-page/dist/* public/

      - name: Build and push image
        run: |
          set -e
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" -f Dockerfile.production .
          docker push "$IMAGE"
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Build and push ADK image
        run: |
          set -e
          ADK_IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.ADK_SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$ADK_IMAGE" -f ../services/adk/Dockerfile ../services/adk
          docker push "$ADK_IMAGE"
          echo "ADK_IMAGE=${ADK_IMAGE}" >> $GITHUB_ENV

      - name: Deploy ADK service
        id: deploy-adk
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.ADK_SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.ADK_IMAGE }}
          flags: |
            --allow-unauthenticated
            --cpu=1
            --memory=1Gi
            --min-instances=0
            --max-instances=10
          port: 8080
          env_vars: NODE_ENV=production,ADK_PUBLIC_HEALTH=true,ADK_AUTH_TOKEN=${{ secrets.ADK_AUTH_TOKEN }},KIMI_API_KEY=${{ secrets.KIMI_API_KEY }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Run migrations (inline docker)
        run: |
          set -e
          echo "=== Running migrations inline ==="
          docker run --rm \
            -e NODE_ENV=production \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e DIRECT_URL="${{ secrets.DIRECT_URL }}" \
            "${{ env.IMAGE }}" \
            node scripts/migrate.js

      - name: Deploy to Cloud Run (100% traffic)
        id: deploy-prod
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          flags: |
            --allow-unauthenticated
            --cpu=1
            --memory=1Gi
            --min-instances=0
            --max-instances=10
          # Cloud Run env vars (comma-separated to avoid gcloud multiline parsing issues).
          # VAPID_PUBLIC_KEY is public (served to browsers) so it's a literal here;
          # VAPID_SUBJECT is optional (web-push.ts falls back to a default mailto).
          # VAPID_PRIVATE_KEY is mounted from Secret Manager via `secrets:` below.
          env_vars: NODE_ENV=production,APP_VERSION=${{ github.sha }},DATABASE_URL=${{ secrets.DATABASE_URL }},DIRECT_URL=${{ secrets.DIRECT_URL }},NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }},NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }},NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }},REDIS_URL=${{ secrets.REDIS_URL }},KIMI_API_KEY=${{ secrets.KIMI_API_KEY }},KIMI_BASE_URL=https://api.moonshot.ai/v1,KIMI_MODEL=moonshot-v1-8k,KIMI_VISION_MODEL=moonshot-v1-8k-vision-preview,DAILY_API_KEY=${{ secrets.DAILY_API_KEY }},GCS_BUCKET=${{ secrets.GCS_BUCKET }},GCS_VIDEO_BUCKET=${{ secrets.GCS_VIDEO_BUCKET }},GCS_VIDEO_BUCKET_URL=${{ secrets.GCS_VIDEO_BUCKET_URL }},SKIP_MIGRATIONS=true,MIGRATIONS_REQUIRED=false,ADK_BASE_URL=${{ steps.deploy-adk.outputs.url }},ADK_AUTH_TOKEN=${{ secrets.ADK_AUTH_TOKEN }},VAPID_PUBLIC_KEY=BLU03HUyohyMlSRHnva794Ea1Y7BKl76i8xZNLiwHgR0D5NI4AhQUURdgI_m6aZo931gW4LsoP7RwguNwkwklK0,VAPID_SUBJECT=${{ secrets.VAPID_SUBJECT }}
          # Web-push private key, mounted from Secret Manager as an env var.
          secrets: |-
            VAPID_PRIVATE_KEY=VAPID_PRIVATE_KEY:latest

      - name: Route 100% traffic to latest
        run: |
          gcloud run services update-traffic "${{ env.SERVICE_NAME }}" \
            --region="${{ env.REGION }}" \
            --to-latest

      - name: Show production URL
        run: echo "Production URL -> ${{ steps.deploy-prod.outputs.url }}"
