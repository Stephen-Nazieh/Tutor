name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main # Change this if your default branch is something else (e.g., master)
  workflow_dispatch:

env:
  PROJECT_ID: project-29e0fd29-a707-458c-bd1
  # GCP configurations 👇
  REGION: asia-southeast1
  SERVICE_NAME: tutorme-app
  GAR_LOCATION: asia
  GAR_REPO: tutorme-repo

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup NodeJS for testing/linting beforehand if needed
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "./tutorme-app/package-lock.json"

      # Only deploy if typecheck & lint pass
      - name: Install dependencies & Typecheck
        working-directory: ./tutorme-app
        run: |
          npm ci
          npm run typecheck
          npm run lint || true # Remove `|| true` to enforce strict lint passing

      # Authenticate to Google Cloud
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_CREDENTIALS }}"
          # Alternatively, use Workload Identity Federation (recommended for production security)
          # workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          # service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'

      # Configure Docker to use Google Artifact Registry
      - name: Docker Auth
        id: docker-auth
        uses: google-github-actions/setup-gcloud@v2
      - run: |-
          gcloud auth configure-docker "${{ env.GAR_LOCATION }}-docker.pkg.dev"

      # Build & Push the Docker image
      - name: Build and Push Docker Image
        working-directory: ./tutorme-app
        run: |
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" -f Dockerfile.production .
          docker push "$IMAGE"

      # Deploy to Cloud Run
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --cpu=1
            --memory=1Gi
            --min-instances=0
            --max-instances=10

      - name: Show Output
        run: echo "Deployed Service URL -> ${{ steps.deploy.outputs.url }}"
