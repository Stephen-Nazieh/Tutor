# Solocorn CI/CD: Production Only (GCP Cloud Run)
# - CI: build + lint on every push to main
# - Production: on push to main, deploy and migrate 100% traffic

name: Solocorn Production Deploy (GCP Cloud Run)

on:
  push:
    branches: [main]

defaults:
  run:
    working-directory: tutorme-app

env:
  REGION: asia-southeast1
  SERVICE_NAME: tutorme-app
  MIGRATION_JOB_NAME: tutorme-app-migrate
  GAR_LOCATION: asia-southeast1
  GAR_REPO: tutorme-repo
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # CI Job (Safety Check): block if build or lint fails
  # ---------------------------------------------------------------------------
  ci:
    name: CI (build + lint)
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: tutorme-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build landing page (integrated)
        run: |
          cd ../landing-page
          npm ci
          npm run build
          cd ../tutorme-app
          cp -r ../landing-page/dist/* public/

      - name: Install Linux native bindings (Next.js build on ubuntu-latest)
        run: npm install --no-save --legacy-peer-deps @parcel/watcher-linux-x64-glibc @swc/core-linux-x64-gnu @next/swc-linux-x64-gnu esbuild

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint:check -- --max-warnings=999999

  # ---------------------------------------------------------------------------
  # Production Job: deploy on push to main and migrate 100% traffic
  # ---------------------------------------------------------------------------
  production:
    name: Production (deploy + 100% traffic)
    runs-on: ubuntu-latest
    needs: [ci]
    # Serialize production deploys so concurrent merges don't race the single
    # Cloud Run service (which aborts with "version X specified but current is
    # Y"). New deploys queue behind the running one instead of cancelling it —
    # we never interrupt an in-flight deploy/migration.
    concurrency:
      group: prod-cloudrun-deploy
      cancel-in-progress: false
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: tutorme-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure deploy SA can read logs
        run: |
          set -e
          ACCOUNT=$(gcloud config get-value account 2>/dev/null || true)
          if [ -n "${ACCOUNT}" ]; then
            gcloud projects add-iam-policy-binding "${{ env.PROJECT_ID }}" \
              --member="serviceAccount:${ACCOUNT}" \
              --role="roles/logging.viewer" \
              --quiet || true
          fi

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe ${{ env.GAR_REPO }} \
            --location=${{ env.GAR_LOCATION }} \
            --project=${{ env.PROJECT_ID }} 2>/dev/null || \
          gcloud artifacts repositories create ${{ env.GAR_REPO }} \
            --repository-format=docker \
            --location=${{ env.GAR_LOCATION }} \
            --project=${{ env.PROJECT_ID }} \
            --description="Docker images for tutorme-app"

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build landing page (integrated)
        run: |
          cd ../landing-page
          npm ci
          npm run build
          cd ../tutorme-app
          cp -r ../landing-page/dist/* public/

      - name: Build and push image
        run: |
          set -e
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" -f Dockerfile.production .
          docker push "$IMAGE"
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      # ADK is currently DISABLED: the app no longer receives ADK_BASE_URL/ADK_AUTH_TOKEN,
      # so it runs the direct Kimi path (ADK is broken and being retired by the agent-kit
      # refactor). adk-service lives in its own repo (Solocorn-LLC/adk-service); to re-enable
      # ADK, re-add those two vars to the app env_vars below and fix/redeploy adk-service.

      - name: Run migrations (inline docker)
        run: |
          set -e
          echo "=== Running migrations inline ==="
          docker run --rm \
            -e NODE_ENV=production \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e DIRECT_URL="${{ secrets.DIRECT_URL }}" \
            "${{ env.IMAGE }}" \
            node scripts/migrate.js

      - name: Deploy new revision (canary — 0% traffic until smoke passes)
        id: deploy-prod
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          # --no-traffic + --tag=canary: the new revision receives ZERO user
          # traffic and a private `canary` URL. The currently-serving revision
          # keeps 100% until the smoke test below passes, so a broken build never
          # reaches users. (Migrations already ran above — keep them backward-
          # compatible so the old revision stays healthy if we don't promote.)
          flags: |
            --allow-unauthenticated
            --cpu=1
            --memory=1Gi
            --min-instances=0
            --max-instances=10
            --no-cpu-throttling
            --session-affinity
            --no-traffic
            --tag=canary
          # Cloud Run env vars (comma-separated to avoid gcloud multiline parsing issues).
          # VAPID_PUBLIC_KEY is public (served to browsers) so it's a literal here;
          # VAPID_SUBJECT is optional (web-push.ts falls back to a default mailto).
          # VAPID_PRIVATE_KEY is mounted from Secret Manager via `secrets:` below.
          env_vars: NODE_ENV=production,APP_VERSION=${{ github.sha }},DATABASE_URL=${{ secrets.DATABASE_URL }},DIRECT_URL=${{ secrets.DIRECT_URL }},NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }},NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }},NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }},REDIS_URL=${{ secrets.REDIS_URL }},KIMI_API_KEY=${{ secrets.KIMI_API_KEY }},KIMI_BASE_URL=https://api.moonshot.ai/v1,KIMI_MODEL=moonshot-v1-32k,KIMI_VISION_MODEL=moonshot-v1-32k-vision-preview,DAILY_API_KEY=${{ secrets.DAILY_API_KEY }},GCS_BUCKET=${{ secrets.GCS_BUCKET }},GCS_VIDEO_BUCKET=${{ secrets.GCS_VIDEO_BUCKET }},GCS_VIDEO_BUCKET_URL=${{ secrets.GCS_VIDEO_BUCKET_URL }},SKIP_MIGRATIONS=true,MIGRATIONS_REQUIRED=false,VAPID_PUBLIC_KEY=BLU03HUyohyMlSRHnva794Ea1Y7BKl76i8xZNLiwHgR0D5NI4AhQUURdgI_m6aZo931gW4LsoP7RwguNwkwklK0,VAPID_SUBJECT=${{ secrets.VAPID_SUBJECT }}
          # Web-push private key, mounted from Secret Manager as an env var.
          secrets: |-
            VAPID_PRIVATE_KEY=VAPID_PRIVATE_KEY:latest

      - name: Smoke-test the canary (gates promotion to prod)
        run: |
          set -e
          BASE="${{ steps.deploy-prod.outputs.url }}"
          CANARY="https://canary---${BASE#https://}"
          echo "Smoking canary revision at $CANARY"
          ok=0
          for i in $(seq 1 24); do
            code=$(curl -s -m 20 -o /dev/null -w '%{http_code}' "$CANARY/api/health" || echo 000)
            echo "attempt $i: $CANARY/api/health -> $code"
            if [ "$code" = "200" ]; then ok=1; break; fi
            sleep 10   # /api/health returns 503 (Retry-After) during boot
          done
          if [ "$ok" != "1" ]; then
            echo "::error title=Canary smoke failed::/api/health never returned 200 — NOT promoting. Traffic stays on the current healthy revision."
            exit 1
          fi
          echo "Canary healthy - promoting to 100%"

      - name: Promote canary to 100% traffic
        run: |
          gcloud run services update-traffic "${{ env.SERVICE_NAME }}" \
            --region="${{ env.REGION }}" --to-latest
          # drop the canary tag now that it's the live revision
          gcloud run services update-traffic "${{ env.SERVICE_NAME }}" \
            --region="${{ env.REGION }}" --remove-tags=canary || true

      - name: Show production URL
        run: echo "Production URL -> ${{ steps.deploy-prod.outputs.url }}"

      # Non-blocking post-deploy smoke of document storage. Hits the existing
      # unauthenticated diagnostic and surfaces a GH annotation if GCS is
      # mis-set (e.g. signBlob missing → signed URLs fall back to 403 public
      # URLs), so a "Failed to fetch PDF" class of incident is caught here
      # instead of by a tutor. Never fails the deploy.
      - name: Storage health smoke (non-blocking)
        continue-on-error: true
        run: |
          URL="${{ steps.deploy-prod.outputs.url }}"
          echo "Checking storage health at $URL/api/health/storage"
          body=$(curl -s -m 30 -w $'\n%{http_code}' "$URL/api/health/storage" || printf '\n000')
          code=$(printf '%s' "$body" | tail -1)
          json=$(printf '%s' "$body" | sed '$d')
          echo "HTTP $code"
          echo "$json"
          overall=$(printf '%s' "$json" | grep -o '"overall":"[a-z_]*"' | head -1)
          case "$overall" in
            *healthy*) echo "Storage OK ($overall)";;
            "") echo "::warning title=Storage health::Could not read storage health (HTTP $code).";;
            *) echo "::warning title=Storage health::$overall — see JSON above (check signBlob / bucket / credentials).";;
          esac
