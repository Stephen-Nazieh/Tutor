# Solocorn CI/CD: Production Only (GCP Cloud Run)
# - CI: build + lint on every push to main
# - Production: on push to main, deploy and migrate 100% traffic

name: Solocorn Production Deploy (GCP Cloud Run)

on:
  push:
    branches: [main]

defaults:
  run:
    working-directory: tutorme-app

env:
  REGION: asia-southeast1
  SERVICE_NAME: tutorme-app
  GAR_LOCATION: asia-southeast1
  GAR_REPO: tutorme-repo
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # CI Job (Safety Check): block if build or lint fails
  # ---------------------------------------------------------------------------
  ci:
    name: CI (build + lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: tutorme-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Linux native bindings (Next.js build on ubuntu-latest)
        run: npm install --no-save --legacy-peer-deps @parcel/watcher-linux-x64-glibc @swc/core-linux-x64-gnu @next/swc-linux-x64-gnu esbuild

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint:check

  # ---------------------------------------------------------------------------
  # Production Job: deploy on push to main and migrate 100% traffic
  # ---------------------------------------------------------------------------
  production:
    name: Production (deploy + 100% traffic)
    runs-on: ubuntu-latest
    needs: [ci]
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: tutorme-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe ${{ env.GAR_REPO }} \
            --location=${{ env.GAR_LOCATION }} \
            --project=${{ env.PROJECT_ID }} 2>/dev/null || \
          gcloud artifacts repositories create ${{ env.GAR_REPO }} \
            --repository-format=docker \
            --location=${{ env.GAR_LOCATION }} \
            --project=${{ env.PROJECT_ID }} \
            --description="Docker images for tutorme-app"

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          set -e
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" -f Dockerfile.production .
          docker push "$IMAGE"
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Apply schema changes
        run: |
          node -e "
          const { Client } = require('pg');
          const fs = require('fs');
          const path = require('path');
          async function main() {
            const client = new Client({ connectionString: process.env.DIRECT_URL });
            await client.connect();
            const sql = fs.readFileSync(path.join('scripts', 'apply-schema-changes.sql'), 'utf8');
            await client.query(sql);
            await client.end();
            console.log('Schema changes applied successfully');
          }
          main().catch(err => { console.error(err); process.exit(1); });
        "
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Deploy to Cloud Run (100% traffic)
        id: deploy-prod
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          flags: |
            --allow-unauthenticated
            --cpu=1
            --memory=1Gi
            --min-instances=0
            --max-instances=10
          # Cloud Run env vars (comma-separated to avoid gcloud multiline parsing issues)
          env_vars: NODE_ENV=production,DATABASE_URL=${{ secrets.DATABASE_URL }},DIRECT_URL=${{ secrets.DIRECT_URL }},NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }},NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }},REDIS_URL=${{ secrets.REDIS_URL }}

      - name: Route 100% traffic to latest
        run: |
          gcloud run services update-traffic "${{ env.SERVICE_NAME }}" \
            --region="${{ env.REGION }}" \
            --to-latest

      - name: Show production URL
        run: echo "Production URL -> ${{ steps.deploy-prod.outputs.url }}"
