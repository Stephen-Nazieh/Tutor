name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

defaults:
  run:
    working-directory: tutorme-app

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tutorme-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Drizzle Types
        run: npx drizzle-kit generate

      - name: Typecheck
        run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tutorme-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build landing page (integrated)
        run: |
          cd ../landing-page
          npm ci
          npm run build
          cd ../tutorme-app
          cp -r ../landing-page/dist/* public/

      - name: Install Linux native bindings (Next.js build on ubuntu-latest)
        run: npm install --no-save --legacy-peer-deps @parcel/watcher-linux-x64-glibc @swc/core-linux-x64-gnu @next/swc-linux-x64-gnu

      - name: Clean build cache
        run: rm -rf .next

      - name: Generate Drizzle Types
        run: npx drizzle-kit generate

      - name: Build
        run: npm run build

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tutorme-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Rollup Linux native binding (Vitest/unit tests on ubuntu-latest)
        run: npm install --no-save --legacy-peer-deps @rollup/rollup-linux-x64-gnu

      - name: Run unit tests
        run: npm run test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tutorme-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint:ci

  format:
    name: Format
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tutorme-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Format check
        run: npm run format:check

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tutorme-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Security audit
        run: npm run security:check

  # Integration tests run against an ephemeral Postgres. Schema is built from the
  # source of truth via `drizzle-kit push` (no migration replay), so these tests
  # protect the real DB-backed flows (grading, reminders, tutor discovery, etc.).
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tutorme
          POSTGRES_PASSWORD: tutorme_password
          POSTGRES_DB: tutorme_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://tutorme:tutorme_password@localhost:5432/tutorme_test
      DIRECT_URL: postgresql://tutorme:tutorme_password@localhost:5432/tutorme_test
      NEXTAUTH_SECRET: integration-ci-secret-insecure-but-long-enough-32chars
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tutorme-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Rollup Linux native binding (Vitest on ubuntu-latest)
        run: npm install --no-save --legacy-peer-deps @rollup/rollup-linux-x64-gnu

      - name: Push schema to test database
        run: npx drizzle-kit push --force

      - name: Run integration tests
        run: npm run test:integration

  # Advisory (non-blocking) e2e smoke for the insights builder. Boots the built
  # app against an ephemeral Postgres, seeds a tutor, and runs the tab-loop
  # regression spec (guards the React #185 loop fixed in #262/#264/#280). Marked
  # continue-on-error and intentionally NOT a required check while it proves out
  # — promote it to required once it has a stable green history.
  e2e-insights:
    name: E2E insights (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tutorme
          POSTGRES_PASSWORD: tutorme_password
          POSTGRES_DB: tutorme_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      NODE_OPTIONS: --max-old-space-size=4096
      DATABASE_URL: postgresql://tutorme:tutorme_password@localhost:5432/tutorme_test
      DIRECT_URL: postgresql://tutorme:tutorme_password@localhost:5432/tutorme_test
      NEXTAUTH_SECRET: e2e-ci-secret-insecure-but-long-enough-32chars
      NEXTAUTH_URL: http://localhost:3003
      PLAYWRIGHT_BASE_URL: http://localhost:3003
      E2E_TUTOR_EMAIL: tutor@example.com
      E2E_TUTOR_PASSWORD: Password1
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tutorme-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Linux native bindings (Next.js build on ubuntu-latest)
        run: npm install --no-save --legacy-peer-deps @parcel/watcher-linux-x64-glibc @swc/core-linux-x64-gnu @next/swc-linux-x64-gnu

      - name: Generate Drizzle Types
        run: npx drizzle-kit generate

      - name: Build
        run: npm run build

      - name: Push schema to test database
        run: npx drizzle-kit push --force

      - name: Seed e2e tutor
        run: npx tsx src/scripts/seed-e2e-tutor.ts

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start app
        # server.ts is the canonical entrypoint (custom server + Socket.io); it
        # binds :3003 and serves the production .next build.
        run: |
          NODE_ENV=production npx tsx server.ts > /tmp/app.log 2>&1 &
          echo $! > /tmp/app.pid

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3003/login >/dev/null; then echo "app is up"; exit 0; fi
            sleep 2
          done
          echo "app did not become ready in time"; cat /tmp/app.log; exit 1

      - name: Run insights tab-loop spec
        run: npx playwright test e2e/insights-tab-loop.spec.ts --project=chromium

      - name: App logs (on failure)
        if: failure()
        run: cat /tmp/app.log || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-insights
          path: tutorme-app/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
